<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday baby</title>

<style>
:root {
    --bg-top: #ffd7ea;
    --bg-mid: #ff7ab8;
    --bg-bottom: #ff5a9f;
    --panel: rgba(255, 248, 252, 0.82);
    --panel-strong: rgba(255, 255, 255, 0.94);
    --text: #4f2640;
    --text-soft: #8d5b77;
    --accent: #ff4d93;
    --accent-deep: #ff2c7d;
    --shadow: 0 24px 60px rgba(132, 32, 79, 0.22);
    --shadow-soft: 0 14px 32px rgba(132, 32, 79, 0.16);
}

* {
    box-sizing: border-box;
}

body {
    margin: 0;
    font-family: "Trebuchet MS", "Segoe UI", sans-serif;
    color: var(--text);
    background:
        radial-gradient(circle at top left, rgba(255,255,255,0.55), transparent 32%),
        radial-gradient(circle at bottom right, rgba(255,215,234,0.45), transparent 30%),
        linear-gradient(150deg, var(--bg-top) 0%, var(--bg-mid) 48%, var(--bg-bottom) 100%);
    min-height: 100vh;
    padding: 16px 12px;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    overflow-y: auto;
    overflow-x: hidden;
    position: relative;
}

body::before,
body::after {
    content: "";
    position: fixed;
    border-radius: 999px;
    pointer-events: none;
    z-index: 0;
}

body::before {
    width: 280px;
    height: 280px;
    top: -80px;
    left: -60px;
    background: radial-gradient(circle, rgba(255,255,255,0.55), rgba(255,255,255,0));
}

body::after {
    width: 360px;
    height: 360px;
    right: -130px;
    bottom: -120px;
    background: radial-gradient(circle, rgba(255, 208, 229, 0.5), rgba(255,255,255,0));
}

/* CARD */
.card {
    position: relative;
    z-index: 1;
    background: var(--panel);
    border: 1px solid rgba(255,255,255,0.7);
    border-radius: 28px;
    padding: 24px 18px;
    text-align: center;
    width: min(92vw, 340px);
    box-shadow: var(--shadow);
    backdrop-filter: blur(14px);
    overflow: hidden;
    animation: card-rise 0.7s ease both;
}

.card::before {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.34), transparent 58%);
    pointer-events: none;
}

.card > * {
    position: relative;
    z-index: 1;
}

.eyebrow {
    margin: 0 0 10px;
    color: var(--text-soft);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.24em;
    text-transform: uppercase;
}

.card-title {
    margin: 0;
    font-size: clamp(28px, 7vw, 36px);
    line-height: 1.08;
}

.card-copy {
    margin: 12px 0 0;
    color: var(--text-soft);
    line-height: 1.6;
    font-size: clamp(14px, 3.5vw, 15px);
}

/* BUTTONS */
button {
    padding: 12px 22px;
    border-radius: 999px;
    border: none;
    background: rgba(255,255,255,0.88);
    color: var(--text);
    box-shadow: var(--shadow-soft);
    cursor: pointer;
    font-size: 15px;
    font-weight: 700;
    transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
}

button:hover {
    transform: translateY(-2px);
}

.button-row {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 10px;
    margin-top: 22px;
}

#yesBtn {
    background: linear-gradient(135deg, var(--accent), var(--accent-deep));
    color: white;
    box-shadow: 0 14px 28px rgba(255, 77, 147, 0.34);
}

#noBtn {
    background: rgba(255,255,255,0.88);
    color: var(--text-soft);
    box-shadow: var(--shadow-soft);
}

#unlockBtn {
    background: linear-gradient(135deg, rgba(255,255,255,0.98), rgba(255, 223, 236, 0.98));
}

.secret-input {
    width: min(100%, 260px);
    margin-top: 18px;
    padding: 14px 16px;
    border-radius: 18px;
    border: 1px solid rgba(255,255,255,0.88);
    background: rgba(255,255,255,0.95);
    color: var(--text);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.85), 0 10px 24px rgba(123, 39, 79, 0.08);
    font-size: 16px;
    text-align: center;
    outline: none;
}

.secret-input:focus {
    border-color: rgba(255, 77, 147, 0.45);
    box-shadow: 0 0 0 4px rgba(255, 77, 147, 0.12);
}

.secret-input::placeholder {
    color: #c18ca9;
}

/* HIDDEN PAGES */
#page2, #page3 {
    display: none;
}

#page3 {
    width: min(92vw, 560px);
    padding-top: 22px;
}

.birthday-title,
#page3 h2 {
    margin: 0;
    font-size: clamp(32px, 7.5vw, 42px);
    line-height: 1.04;
}

.birthday-subtitle {
    margin: 10px auto 0;
    max-width: 30ch;
    color: var(--text-soft);
    line-height: 1.6;
    font-size: clamp(14px, 3.4vw, 15px);
}

.typing {
    margin-top: 20px;
    min-height: 140px;
    padding: 20px 18px 22px;
    white-space: pre-line;
    text-align: left;
    line-height: 1.75;
    font-size: clamp(14px, 3.3vw, 16px);
    border-radius: 24px;
    color: #5b3149;
    background:
        linear-gradient(180deg, rgba(255,255,255,0.9), rgba(255,244,249,0.88)),
        repeating-linear-gradient(
            to bottom,
            transparent 0,
            transparent 30px,
            rgba(255, 132, 177, 0.12) 30px,
            rgba(255, 132, 177, 0.12) 31px
        );
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.85), var(--shadow-soft);
}

.typing::before {
    content: "A little note for you";
    display: block;
    margin-bottom: 12px;
    color: var(--text-soft);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.22em;
    text-transform: uppercase;
}

/* SLIDESHOW */
.slideshow {
    width: clamp(180px, 56vw, 240px);
    height: clamp(260px, 80vw, 340px);
    padding: 8px;
    border-radius: 28px;
    background: var(--panel-strong);
    overflow: hidden;
    margin: 0 auto 18px;
    box-shadow: 0 22px 44px rgba(120, 39, 79, 0.2);
    transform: rotate(-2deg);
    animation: photo-float 5s ease-in-out infinite;
}

.slideshow img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    border-radius: 20px;
    transition: opacity 0.35s ease, transform 0.6s ease;
}

.slideshow img.is-fading {
    opacity: 0.4;
    transform: scale(1.03);
}

@media (min-width: 768px) {
    body {
        padding: 28px;
        align-items: center;
    }

    .card {
        padding: 32px 30px;
    }

    .slideshow {
        width: 240px;
        height: 340px;
    }
}

@keyframes card-rise {
    from {
        opacity: 0;
        transform: translateY(18px) scale(0.98);
    }
    to {
        opacity: 1;
        transform: translateY(0) scale(1);
    }
}

@keyframes photo-float {
    0%, 100% {
        transform: rotate(-2deg) translateY(0);
    }
    50% {
        transform: rotate(-1deg) translateY(-5px);
    }
}
</style>
</head>

<body>

<!-- 🎵 MUSIC -->
<audio id="bgMusic" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<!-- 💖 PAGE 1: LOVE QUESTION -->
<div class="card" id="page1">
    <p class="eyebrow">hi pretty!</p>
    <h2 class="card-title">Do you love me po ba?</h2>
    <p class="card-copy">checkpoint lang babycakes</p>
    <div class="button-row">
        <button id="yesBtn" onclick="goToPage2()">YES ^^</button>
        <button id="noBtn" onclick="growYes()">NO :((</button>
    </div>
</div>

<!-- 🔐 PAGE 2: PASSWORD -->
<div class="card" id="page2">
    <p class="eyebrow">password pu</p>
    <h2 class="card-title">Sabihin mong mahal mo ako pls</h2>
    <p class="card-copy">type mo na yan boss</p>
    <input class="secret-input" type="password" id="code" placeholder="iloveyou">
    <div class="button-row">
        <button id="unlockBtn" onclick="checkCode()">Unlock</button>
    </div>
</div>

<!-- 🎂 PAGE 3: FINAL MESSAGE -->
<div class="card" id="page3">

    <p class="eyebrow">its yo special dayyy</p>
    <div class="slideshow">
        <img id="slide" src="photo1.jpg" alt="Birthday memory">
        <img id="slide" src="photo2.jpg" alt="Birthday memory">
        <img id="slide" src="photo3.jpg" alt="Birthday memory">

    </div>

    <h2>Happy Birthday 🎂</h2>
    <p class="birthday-subtitle">made with a lot of love, just for you.</p>
    <div class="typing" id="typingText"></div>
</div>

<script>
let yesSize = 16;
let slideshowTimer = null;
let typingTimer = null;

const codeInput = document.getElementById("code");
const typingText = document.getElementById("typingText");
const slideImage = document.getElementById("slide");
const bgMusic = document.getElementById("bgMusic");

// 😆 NO button makes YES bigger
function growYes() {
    yesSize += 10;
    document.getElementById("yesBtn").style.fontSize = yesSize + "px";
}

// 👉 Go to password page
function goToPage2() {
    document.getElementById("page1").style.display = "none";
    document.getElementById("page2").style.display = "block";
    window.scrollTo({ top: 0, behavior: "smooth" });
    codeInput.focus();
}

// 🔐 CHECK CODE
function checkCode() {
    const input = codeInput.value.trim().toLowerCase();

    if (input === "iloveyou") {
        document.getElementById("page2").style.display = "none";
        document.getElementById("page3").style.display = "block";
        window.scrollTo({ top: 0, behavior: "smooth" });

        bgMusic.play().catch(() => {});
        typingText.textContent = "";
        i = 0;
        index = 0;
        slideImage.src = photos[index];
        typeMessage();
        startSlideshow();
    } else {
        alert("wrong ka po baby, try po again!");
    }
}

let i = 0;
const birthdayMessage = `Haii babyy
Medyo mapapa-english ako nang very very light heheh, sana magustuhan mo ang ginawa ko baby! 

Today is all about you - the most beautiful, kind (?), and amazing person I know. You make my days brighter in ways I never expected.
Every laugh, every little moment with you, and every simple day together means more to me than I can explain.
I know na it's a simple message lang, but behind it is all the love, appreciation, and happiness you bring into my life.
On your birthday, I just want you to remember how special you are. Not just today, but every single day.

Mahal kita, sana marealize mo na you're literally the sexiest, prettiest, gorgeous, and most wonderful person in the world to me.. I hope you'll start loving yourself as much as I love every part of you, because you deserve all the love and happiness in the world. 
Thank you for being you, and for being mine.

Happy Birthday, baby!

- ang sakit mo sa ulo
`;

function typeMessage() {
    clearTimeout(typingTimer);

    if (i < birthdayMessage.length) {
        typingText.textContent += birthdayMessage.charAt(i);
        i++;
        typingTimer = setTimeout(typeMessage, 34);
    }
}

// 📸 SLIDESHOW
const photos = ["photo1.jpg","photo2.jpg","photo3.jpg"];
let index = 0;

function startSlideshow() {
    if (slideshowTimer) {
        return;
    }

    slideshowTimer = setInterval(() => {
        slideImage.classList.add("is-fading");

        setTimeout(() => {
            index = (index + 1) % photos.length;
            slideImage.src = photos[index];
            slideImage.classList.remove("is-fading");
        }, 180);
    }, 2400);
}

codeInput.addEventListener("keydown", (event) => {
    if (event.key === "Enter") {
        checkCode();
    }
});
</script>

</body>
</html>
